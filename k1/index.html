<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .selected-lang{
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            line-height:2;
            width: 120px;
            float: right;
        }
        .selected-lang:before{
            content: "";
            display: block;
            width: 32px;
            height: 32px;
            background-image: url("https://www.countryflags.io/ge/flat/32.png");
        }
        .lang-menu{
            margin-top: 25px;
            position: relative;
            float: right;

        }
        .lang-menu ul{
            margin: 0;
            padding: 0;
            background-color: #fff;
            border: 1px solid #f8f8f8;
            box-shadow: 0px 1px 10px rgba(0,0,0,0.2);
            border-radius: 5px;
            width: 60px;
            display: none;
            position: absolute;
            top:0;
            left: 0;

        }
        .lang-menu ul li{
            list-style: none;
            display: flex;
            justify-content: space-between;
        }
        .lang-menu ul li a{
            width: 60px;
            display: block;
            padding: 5px 10px;
        }
        .lang-menu ul li a:hover{
            background-color: #f2f2f2;
        }
        .lang-menu ul li a:before{
            content: "";
            display: block;
            width: 32px;
            height: 32px;
            display: inline-block;
            vertical-align: middle;
            margin-right: 10px;
        }
        .lang-menu:hover ul{
            display: block;
            cursor: pointer;
        }
        .en:before{
            background-image: url("https://www.countryflags.io/us/flat/32.png");
        }
        .ru:before{
            background-image: url("https://www.countryflags.io/RU/flat/32.png");
        }
    </style>
</head>
<body>
    <div class="lang-menu">
        <div class="selected-lang">
            
        </div>
        <ul>
            <li>
                <a class="en"></a>
            </li>
            <li>
                <a class="ru"></a>
            </li>
        </ul>
    </div>
</body>
</html>
